    function activeChannel() {
      return CHANNELS.find((channel) => channel.id === state.channelId) || CHANNELS[0];
    }

    function activeItems() {
      const channel = activeChannel();
      const items = Array.isArray(channel.items) ? channel.items.slice() : [];
      const filtered = state.status === "全部" ? items : items.filter((item) => item.status === state.status);
      if (state.sort === "status") {
        filtered.sort((a, b) => {
          const aOrder = Number.isFinite(STATUS_ORDER[a.status]) ? STATUS_ORDER[a.status] : 99;
          const bOrder = Number.isFinite(STATUS_ORDER[b.status]) ? STATUS_ORDER[b.status] : 99;
          if (aOrder !== bOrder) return aOrder - bOrder;
          return String(b.updatedAt || "").localeCompare(String(a.updatedAt || ""));
        });
        return filtered;
      }
      if (state.sort === "title") {
        filtered.sort((a, b) => String(a.title || "").localeCompare(String(b.title || ""), "zh-Hans-CN"));
        return filtered;
      }
      filtered.sort((a, b) => String(b.updatedAt || "").localeCompare(String(a.updatedAt || "")));
      return filtered;
    }

    function ensureSelection(items) {
      if (!items.some((item) => item.id === state.selectedItemId)) {
        state.selectedItemId = items.length ? items[0].id : "";

    }

    function selectedItem() {
      const items = activeChannel().items || [];
      return items.find((item) => item.id === state.selectedItemId) || items[0] || null;
    }

      const glyph = document.createElement("span");
      glyph.className = "g";
      glyph.textContent = item.glyph || "项";
      badge.appendChild(glyph);
      return badge;
    }

      });
      select.addEventListener("change", () => {
        state.sort = select.value;
        render();
      });
      sortWrap.appendChild(select);
      row2.appendChild(info);
      row2.appendChild(sortWrap);

      filterBarEl.appendChild(row1);
      filterBarEl.appendChild(row2);
    }

    function renderConversations() {
      channelConvListEl.innerHTML = "";
      (activeChannel().conversations || []).forEach((conversation) => {
        const item = document.createElement("div");
        item.className = "chconv-item";

        const main = document.createElement("div");
        main.className = "chconv-main";
        const name = document.createElement("div");
        name.className = "chconv-name";
        name.textContent = conversation.name;
        const preview = document.createElement("div");
        preview.className = "chconv-preview";
        preview.textContent = conversation.preview;
        main.appendChild(name);
        main.appendChild(preview);

        const meta = document.createElement("div");
        meta.className = "chconv-meta";
        const cli = document.createElement("span");
        cli.className = "chconv-cli";
        cli.textContent = conversation.cli;
        const time = document.createElement("span");
        time.className = "chconv-time";
        time.textContent = conversation.time;
        meta.appendChild(cli);
        meta.appendChild(time);

        item.appendChild(main);
        item.appendChild(meta);
        channelConvListEl.appendChild(item);
      });
    }

    function renderKnowledge() {
      const groups = activeChannel().knowledge || [];
      channelKnowledgeListEl.innerHTML = "";
      let count = 0;
      groups.forEach((group, groupIndex) => {
        const wrapper = document.createElement("div");
        wrapper.className = "chknow-group";

        const header = document.createElement("div");
        header.className = "chknow-group-header";
        const title = document.createElement("div");
        title.className = "chknow-group-title";
        title.textContent = group.title;
        const meta = document.createElement("div");
        meta.className = "chknow-group-meta";
        meta.textContent = group.meta;
        header.appendChild(title);
        header.appendChild(meta);

        const items = document.createElement("div");
        items.className = "chknow-items";
        (group.items || []).forEach((entry, entryIndex) => {
          count += 1;
          const row = document.createElement("div");
          row.className = "chknow-item" + (groupIndex === 0 && entryIndex === 0 ? " active" : "");
          const rowTitle = document.createElement("div");
          rowTitle.className = "chknow-item-title";
          rowTitle.textContent = entry.title;
          const rowMeta = document.createElement("div");
          rowMeta.className = "chknow-item-meta";
          const path = document.createElement("span");
          path.className = "path";
          path.textContent = entry.path;
          const time = document.createElement("span");
          time.className = "time";
          time.textContent = entry.time;
          rowMeta.appendChild(path);
          rowMeta.appendChild(time);
          row.appendChild(rowTitle);
          row.appendChild(rowMeta);
          items.appendChild(row);
        });

        wrapper.appendChild(header);
        wrapper.appendChild(items);
        channelKnowledgeListEl.appendChild(wrapper);
      });
      knowledgeCountChipEl.textContent = count + "条";
    }

    function renderItems() {
      const items = activeItems();
      ensureSelection(items);
      fileListEl.innerHTML = "";

      items.forEach((item) => {
        const row = document.createElement("button");
        row.type = "button";
        row.className = "frow preview-plain-button preview-task-row" + (item.id === state.selectedItemId ? " active" : "");
        row.setAttribute("aria-pressed", item.id === state.selectedItemId ? "true" : "false");
        row.addEventListener("click", () => {
          state.selectedItemId = item.id;
          renderDetail();
          renderItems();
        });

        const titleRow = document.createElement("div");
        titleRow.className = "mainlist-title-row";
        const titleLine = document.createElement("div");
        titleLine.className = "item-titleline";
        titleLine.appendChild(makeIconBadge(item));
        const title = document.createElement("div");
        title.className = "t";
        title.textContent = item.title;
        titleLine.appendChild(title);

        const ops = document.createElement("div");
        ops.className = "frow-title-ops";
        ops.appendChild(makeChip(item.status, item.tone));
        ops.appendChild(makeChip(item.focus, item.status === "已完成" ? "good" : "muted"));

        titleRow.appendChild(titleLine);
        titleRow.appendChild(ops);

        const meta = document.createElement("div");
        meta.className = "m";
        meta.appendChild(makeChip(item.typeLabel, "muted"));
        meta.appendChild(makeChip("下一责任人:" + item.nextOwner, "waiting"));
        meta.appendChild(makeChip("更新:" + item.updatedAt, "muted"));

        const summary = document.createElement("p");
        summary.className = "preview-task-row-summary";
        summary.textContent = item.summary;

        const grid = document.createElement("div");
        grid.className = "preview-task-row-grid";
        [
          ["当前阶段", item.stage],
          ["最近进展", item.progress],
          ["证据摘要", item.evidence]
        ].forEach(([label, value]) => {
          const cell = document.createElement("div");
          cell.className = "preview-task-kv";
          const cellLabel = document.createElement("div");
          cellLabel.className = "preview-task-kv-label";
          cellLabel.textContent = label;
          const cellValue = document.createElement("div");
          cellValue.className = "preview-task-kv-value";
          cellValue.textContent = value;
          cell.appendChild(cellLabel);
          cell.appendChild(cellValue);
          grid.appendChild(cell);
        });

        const footer = document.createElement("div");
        footer.className = "preview-task-row-footer";
        const owner = document.createElement("div");
        owner.className = "preview-owner-line";
        owner.innerHTML = "当前判断：<strong>" + item.focus + "</strong> · 下一责任人：<strong>" + item.nextOwner + "</strong>";
        const agents = document.createElement("div");
        agents.className = "preview-agent-pills";
        (item.agents || []).forEach((agent) => {
          agents.appendChild(makeChip(agent, "muted"));
        });
        footer.appendChild(owner);
        footer.appendChild(agents);

        const path = document.createElement("div");
        path.className = "p";
        path.textContent = item.path;

        row.appendChild(titleRow);
        row.appendChild(meta);
        row.appendChild(summary);
        row.appendChild(grid);
        row.appendChild(footer);
        row.appendChild(path);
        fileListEl.appendChild(row);
      });

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "hint";
        empty.textContent = "当前筛选条件下没有匹配的事项。";
        fileListEl.appendChild(empty);
      }
    }

    function makeDetailBlock(titleText, bodyBuilder) {
      const item = document.createElement("div");
      item.className = "item preview-detail-block";
      const title = document.createElement("div");
      title.className = "tt";
      title.textContent = titleText;
      const sub = document.createElement("div");
      sub.className = "sub";
      bodyBuilder(sub);
      item.appendChild(title);
      item.appendChild(sub);
      return item;
    }

    function appendKVRows(container, rows) {
      const wrap = document.createElement("div");
      wrap.className = "preview-detail-kv";
      rows.forEach(([key, value]) => {
        const row = document.createElement("div");
        row.className = "preview-detail-kv-row";
        const keyEl = document.createElement("div");
        keyEl.className = "k";
        keyEl.textContent = key;
        const valEl = document.createElement("div");
        valEl.className = "v";
        valEl.textContent = value;
        row.appendChild(keyEl);
        row.appendChild(valEl);
        wrap.appendChild(row);
      });
      container.appendChild(wrap);
    }

    function renderDetail() {
      const item = selectedItem();
      if (!item) return;

      detailTitleEl.innerHTML = "";
      const titleRow = document.createElement("div");
      titleRow.className = "detail-title-row";
      titleRow.appendChild(makeIconBadge(item));
      const titleText = document.createElement("div");
      titleText.className = "detail-title-line";
      const titleMain = document.createElement("span");
      titleMain.className = "detail-title-text";
      titleMain.textContent = item.title;
      const titleType = document.createElement("span");
      titleType.className = "detail-inline-channel";
      titleType.textContent = item.typeLabel;
      titleText.appendChild(titleMain);
      titleText.appendChild(titleType);
      titleRow.appendChild(titleText);
      detailTitleEl.appendChild(titleRow);

      detailSubEl.textContent = item.summary;
      detailPathTextEl.textContent = item.path;

      detailMetaEl.innerHTML = "";
      detailMetaEl.appendChild(makeChip(item.status, item.tone));
      detailMetaEl.appendChild(makeChip(item.focus, item.status === "已完成" ? "good" : "muted"));
      detailMetaEl.appendChild(makeChip("下一责任人:" + item.nextOwner, "waiting"));
      detailMetaEl.appendChild(makeChip("更新:" + item.updatedAt, "muted"));

      detailExcerptEl.innerHTML = "";
      (item.excerpt || []).forEach((text) => {
        const p = document.createElement("p");
        p.textContent = text;
        detailExcerptEl.appendChild(p);
      });

      detailMoreEl.innerHTML = "";
      detailMoreEl.appendChild(makeDetailBlock("当前判断", (sub) => appendKVRows(sub, item.decisions || [])));
      detailMoreEl.appendChild(makeDetailBlock("协作角色", (sub) => appendKVRows(sub, item.roles || [])));
      detailMoreEl.appendChild(makeDetailBlock("最近动作时间线", (sub) => {
        const timeline = document.createElement("div");
        timeline.className = "preview-timeline";
        (item.timeline || []).forEach(([time, text]) => {
          const row = document.createElement("div");
          row.className = "preview-timeline-row";
          const timeEl = document.createElement("div");
          timeEl.className = "preview-timeline-time";
          timeEl.textContent = time;
          const textEl = document.createElement("div");
          textEl.className = "preview-timeline-text";
          textEl.textContent = text;
          row.appendChild(timeEl);
          row.appendChild(textEl);
          timeline.appendChild(row);
        });
        sub.appendChild(timeline);
      }));
      detailMoreEl.appendChild(makeDetailBlock("证据与引用", (sub) => {
        const list = document.createElement("ul");
        list.className = "preview-detail-list";
        (item.evidenceList || []).forEach((entry) => {
          const li = document.createElement("li");
          li.textContent = entry;
          list.appendChild(li);
        });
        sub.appendChild(list);
      }));
      detailMoreEl.appendChild(makeDetailBlock("边界与提醒", (sub) => appendKVRows(sub, item.boundaries || [])));
    }

    function renderDensity() {
      document.body.classList.toggle("preview-density-compact", state.density === "compact");
    }

    async function copyChannelPath() {
      try {
        await navigator.clipboard.writeText(channelPathTextEl.textContent || "");
        const old = channelPathCopyBtn.textContent;
        channelPathCopyBtn.textContent = "已复制";
        window.setTimeout(() => {
          channelPathCopyBtn.textContent = old;
        }, 1200);
      } catch (_) {
        channelPathCopyBtn.textContent = "复制失败";
        window.setTimeout(() => {
          channelPathCopyBtn.textContent = "复制路径";
        }, 1200);
      }
    }

    channelPathCopyBtn.addEventListener("click", copyChannelPath);

    function render() {
      renderDensity();
      renderChannelList();
      renderChannelInfo();
      renderFilterbar();
      renderConversations();
      renderKnowledge();
      renderItems();
      renderDetail();
    }

    render();
  </script>
</body>
</html>
