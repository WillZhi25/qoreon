            ],
            references: [
              ["页面源码", "web/page_previews/task-board-a-in-task-shell-v4.html"],
              ["share 入口", "/share/task-board-a-in-task-shell-v4.html"],
              ["复用基线", "web/task.html.tpl / web/task.css / web/task_parts/77-project-modes.js"]
            ],
            boundaries: [
              ["不改正式源码逻辑", "不进入 QA，不接 live 行为。"]
            ]
          }
        ]
      }
    ];

    const STATUS_OPTIONS = ["全部", "进行中", "待验收", "已完成"];
    const SORT_OPTIONS = [
      { value: "updated", label: "更新时间" },
      { value: "status", label: "状态优先" },
      { value: "title", label: "标题排序" }
    ];
    const STATUS_ORDER = { "进行中": 0, "待验收": 1, "已完成": 2, "待开始": 3 };

    const state = {
      channelId: "assist04",
      status: "全部",
      density: "comfortable",
      sort: "updated",
      selectedItemId: "assist04_main_task"
    };

    const leftListEl = document.getElementById("leftList");
    const currentChannelNameEl = document.getElementById("currentChannelName");
    const channelInfoSubEl = document.getElementById("channelInfoSub");
    const channelInfoStatsEl = document.getElementById("channelInfoStats");
    const channelPathTextEl = document.getElementById("channelPathText");
    const channelConvListEl = document.getElementById("channelConvList");
    const fileListEl = document.getElementById("fileList");
    const channelKnowledgeListEl = document.getElementById("channelKnowledgeList");
    const knowledgeCountChipEl = document.getElementById("knowledgeCountChip");
    const detailTitleEl = document.getElementById("detailTitle");
    const detailSubEl = document.getElementById("detailSub");
    const detailPathTextEl = document.getElementById("detailPathText");
    const detailMetaEl = document.getElementById("detailMeta");
    const detailExcerptEl = document.getElementById("detailExcerpt");
    const detailMoreEl = document.getElementById("detailMore");
    const filterBarEl = document.getElementById("filterBar");
    const channelPathCopyBtn = document.getElementById("channelPathCopyBtn");

    function activeChannel() {
      return CHANNELS.find((channel) => channel.id === state.channelId) || CHANNELS[0];
    }

    function activeItems() {
      const channel = activeChannel();
      const items = Array.isArray(channel.items)
        ? channel.items.filter((item) => String(item.typeLabel || "").trim() === "任务")
        : [];
      const filtered = state.status === "全部" ? items : items.filter((item) => item.status === state.status);
      if (state.sort === "status") {
        filtered.sort((a, b) => {
          const aOrder = Number.isFinite(STATUS_ORDER[a.status]) ? STATUS_ORDER[a.status] : 99;
          const bOrder = Number.isFinite(STATUS_ORDER[b.status]) ? STATUS_ORDER[b.status] : 99;
          if (aOrder !== bOrder) return aOrder - bOrder;
          return String(b.updatedAt || "").localeCompare(String(a.updatedAt || ""));
        });
        return filtered;
      }
      if (state.sort === "title") {
        filtered.sort((a, b) => String(a.title || "").localeCompare(String(b.title || ""), "zh-Hans-CN"));
        return filtered;
      }
      filtered.sort((a, b) => String(b.updatedAt || "").localeCompare(String(a.updatedAt || "")));
      return filtered;
    }

    function ensureSelection(items) {
      if (!items.some((item) => item.id === state.selectedItemId)) {
        state.selectedItemId = items.length ? items[0].id : "";
      }
    }

    function selectedItem() {
      const items = activeChannel().items || [];
      return items.find((item) => item.id === state.selectedItemId) || items[0] || null;
    }

    function makeChip(text, tone) {
      const span = document.createElement("span");
      span.className = "chip" + (tone ? (" " + tone) : "");
      span.textContent = text;
      return span;
    }

    function makeIconBadge(item) {
      const badge = document.createElement("span");
      badge.className = "typeicon-badge " + String(item.typeClass || "typeicon-other");
      const glyph = document.createElement("span");
      glyph.className = "g";
      glyph.textContent = item.glyph || "项";
      badge.appendChild(glyph);
      return badge;
    }

    const AGENT_AVATAR_TONES = [
      { bg: "rgba(239, 246, 255, 0.98)", border: "rgba(191, 219, 254, 0.98)", ink: "#1d4ed8" },
      { bg: "rgba(236, 253, 245, 0.98)", border: "rgba(167, 243, 208, 0.98)", ink: "#047857" },
      { bg: "rgba(255, 247, 237, 0.98)", border: "rgba(253, 186, 116, 0.98)", ink: "#c2410c" },
      { bg: "rgba(245, 243, 255, 0.98)", border: "rgba(196, 181, 253, 0.98)", ink: "#6d28d9" }
    ];

    function uniqueAgentsOf(item) {
      return Array.from(new Set((item.agents || []).map((entry) => String(entry || "").trim()).filter(Boolean)));
    }

    function agentAvatarLabel(name) {
      const text = String(name || "").trim();
      if (!text) return "?";
      const parts = text.split(/[-·]/).map((part) => part.trim()).filter(Boolean);
      const basis = parts[parts.length - 1] || text;
      const chars = Array.from(basis);
      return chars[0] || "?";
    }

    function makeAgentStack(item) {
      const agents = uniqueAgentsOf(item);
      const wrap = document.createElement("div");
      wrap.className = "preview-agent-stack";

      const label = document.createElement("span");
      label.className = "preview-agent-label";
      label.textContent = "参与Agent";
      wrap.appendChild(label);

      const avatars = document.createElement("div");
      avatars.className = "preview-agent-avatars";
      agents.slice(0, 3).forEach((agent, index) => {
        const avatar = document.createElement("span");
        const tone = AGENT_AVATAR_TONES[index % AGENT_AVATAR_TONES.length];
        avatar.className = "preview-agent-avatar";
        avatar.style.setProperty("--tone-bg", tone.bg);
        avatar.style.setProperty("--tone-border", tone.border);
        avatar.style.setProperty("--tone-ink", tone.ink);
        avatar.textContent = agentAvatarLabel(agent);
        avatar.title = agent;
        avatars.appendChild(avatar);
      });
      if (agents.length > 3) {
        const extra = document.createElement("span");
        extra.className = "preview-agent-extra";
        extra.textContent = "+" + String(agents.length - 3);
        extra.title = agents.slice(3).join(" / ");
        avatars.appendChild(extra);
      }
      wrap.appendChild(avatars);

      const count = document.createElement("span");
      count.className = "preview-agent-count";
      count.textContent = agents.length ? (agents.length + " 位") : "未标注";
      wrap.appendChild(count);

      return wrap;
    }

    function renderChannelList() {
      leftListEl.innerHTML = "";
      CHANNELS.forEach((channel) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "rowbtn preview-plain-button" + (channel.id === state.channelId ? " active" : "");
        button.setAttribute("aria-pressed", channel.id === state.channelId ? "true" : "false");
        button.addEventListener("click", () => {
          state.channelId = channel.id;
          state.selectedItemId = String((channel.items && channel.items[0] && channel.items[0].id) || "");
          render();
        });

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = channel.name;

        const meta = document.createElement("div");
        meta.className = "preview-channel-row-meta";
        meta.textContent = channel.summary;

        const chips = document.createElement("div");
        chips.className = "preview-channel-row-chips";
        (channel.stats || []).forEach((text) => {
          chips.appendChild(makeChip(text, "muted"));
        });

        button.appendChild(name);
        button.appendChild(meta);
        button.appendChild(chips);
        leftListEl.appendChild(button);
      });
    }

    function renderChannelInfo() {
      const channel = activeChannel();
      const items = channel.items || [];
      const statusCounts = items.reduce((acc, item) => {
        acc.all += 1;
        acc[item.status] = (acc[item.status] || 0) + 1;
        return acc;
      }, { all: 0 });

      currentChannelNameEl.textContent = channel.name;
      channelInfoSubEl.textContent = channel.summary;
      channelPathTextEl.textContent = "/tmp/qoreon-demo/project/" + channel.path;

      channelInfoStatsEl.innerHTML = "";
      channelInfoStatsEl.appendChild(makeChip("任务列表 " + statusCounts.all, "muted"));
      channelInfoStatsEl.appendChild(makeChip("进行中 " + (statusCounts["进行中"] || 0), "warn"));
      channelInfoStatsEl.appendChild(makeChip("待验收 " + (statusCounts["待验收"] || 0), "waiting"));
      channelInfoStatsEl.appendChild(makeChip("已完成 " + (statusCounts["已完成"] || 0), "good"));
      channelInfoStatsEl.appendChild(makeChip("只读静态镜像", "muted"));
    }

    function renderFilterbar() {
      filterBarEl.innerHTML = "";

      const row1 = document.createElement("div");
      row1.className = "filterrow";
      const main = document.createElement("div");
      main.className = "preview-filterbar-main";
      STATUS_OPTIONS.forEach((status) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "chipbtn" + (state.status === status ? " active" : "");
        button.textContent = status;
        button.addEventListener("click", () => {
          state.status = status;
          render();
        });
        main.appendChild(button);
      });
      const side = document.createElement("div");
      side.className = "preview-filterbar-side";
      ["comfortable", "compact"].forEach((density) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "chipbtn" + (state.density === density ? " active" : "");
        button.textContent = density === "comfortable" ? "标准阅读" : "高密度";
        button.addEventListener("click", () => {
          state.density = density;
          render();
        });
        side.appendChild(button);
      });
      row1.appendChild(main);
      row1.appendChild(side);

      const row2 = document.createElement("div");
      row2.className = "filterrow";
      const info = document.createElement("div");
      info.className = "preview-view-note";
      info.textContent = "仅演示任务读侧结构：主列表只保留任务项，并在现有列表基线上新增参与Agent轻量位。";

      const sortWrap = document.createElement("span");
      sortWrap.className = "conv-sort-inline";
      sortWrap.appendChild(Object.assign(document.createElement("span"), {
        className: "conv-sort-label",
        textContent: "排序"
      }));
      const select = document.createElement("select");
      select.className = "conv-sort-select";
      SORT_OPTIONS.forEach((option) => {
        const node = document.createElement("option");
        node.value = option.value;
        node.textContent = option.label;
        if (option.value === state.sort) node.selected = true;
        select.appendChild(node);
      });
      select.addEventListener("change", () => {
        state.sort = select.value;
        render();
      });
      sortWrap.appendChild(select);
      row2.appendChild(info);
      row2.appendChild(sortWrap);

      filterBarEl.appendChild(row1);
      filterBarEl.appendChild(row2);
    }

    function renderConversations() {
      channelConvListEl.innerHTML = "";
      (activeChannel().conversations || []).forEach((conversation) => {
        const item = document.createElement("div");
        item.className = "chconv-item";

        const main = document.createElement("div");
        main.className = "chconv-main";
        const name = document.createElement("div");
        name.className = "chconv-name";
        name.textContent = conversation.name;
        const preview = document.createElement("div");
        preview.className = "chconv-preview";
        preview.textContent = conversation.preview;
        main.appendChild(name);
        main.appendChild(preview);

        const meta = document.createElement("div");
        meta.className = "chconv-meta";
        const cli = document.createElement("span");
        cli.className = "chconv-cli";
        cli.textContent = conversation.cli;
        const time = document.createElement("span");
        time.className = "chconv-time";
        time.textContent = conversation.time;
        meta.appendChild(cli);
        meta.appendChild(time);

        item.appendChild(main);
        item.appendChild(meta);
        channelConvListEl.appendChild(item);
      });
    }

    function renderKnowledge() {
      const groups = activeChannel().knowledge || [];
      channelKnowledgeListEl.innerHTML = "";
      let count = 0;
      groups.forEach((group, groupIndex) => {
        const wrapper = document.createElement("div");
        wrapper.className = "chknow-group";

        const header = document.createElement("div");
        header.className = "chknow-group-header";
        const title = document.createElement("div");
        title.className = "chknow-group-title";
        title.textContent = group.title;
        const meta = document.createElement("div");
        meta.className = "chknow-group-meta";
        meta.textContent = group.meta;
        header.appendChild(title);
        header.appendChild(meta);

        const items = document.createElement("div");
        items.className = "chknow-items";
        (group.items || []).forEach((entry, entryIndex) => {
          count += 1;
          const row = document.createElement("div");
          row.className = "chknow-item" + (groupIndex === 0 && entryIndex === 0 ? " active" : "");
          const rowTitle = document.createElement("div");
          rowTitle.className = "chknow-item-title";
          rowTitle.textContent = entry.title;
          const rowMeta = document.createElement("div");
          rowMeta.className = "chknow-item-meta";
          const path = document.createElement("span");
          path.className = "path";
          path.textContent = entry.path;
          const time = document.createElement("span");
          time.className = "time";
          time.textContent = entry.time;
          rowMeta.appendChild(path);
          rowMeta.appendChild(time);
          row.appendChild(rowTitle);
          row.appendChild(rowMeta);
          items.appendChild(row);
        });

        wrapper.appendChild(header);
        wrapper.appendChild(items);
        channelKnowledgeListEl.appendChild(wrapper);
      });
      knowledgeCountChipEl.textContent = count + "条";
    }

    function renderItems() {
      const items = activeItems();
      ensureSelection(items);
      fileListEl.innerHTML = "";

      items.forEach((item) => {
        const row = document.createElement("button");
        row.type = "button";
        row.className = "frow preview-plain-button preview-task-row" + (item.id === state.selectedItemId ? " active" : "");
        row.setAttribute("aria-pressed", item.id === state.selectedItemId ? "true" : "false");
        row.addEventListener("click", () => {
          state.selectedItemId = item.id;
          renderDetail();
          renderItems();
        });

        const titleRow = document.createElement("div");
        titleRow.className = "mainlist-title-row";
        const titleLine = document.createElement("div");
        titleLine.className = "item-titleline";
        titleLine.appendChild(makeIconBadge(item));
        const title = document.createElement("div");
        title.className = "t";
        title.textContent = item.title;
        titleLine.appendChild(title);

        const ops = document.createElement("div");
        ops.className = "frow-title-ops";
        ops.appendChild(makeChip(item.status, item.tone));

        titleRow.appendChild(titleLine);
        titleRow.appendChild(ops);

        const meta = document.createElement("div");
        meta.className = "preview-task-brief";
        meta.innerHTML = "更新：" + item.updatedAt + " · 下一责任人：<strong>" + item.nextOwner + "</strong>";

        const summary = document.createElement("p");
        summary.className = "preview-task-row-summary";
        summary.textContent = item.summary;

        const footer = document.createElement("div");
        footer.className = "preview-task-row-bottom";
        const agents = makeAgentStack(item);
        footer.appendChild(agents);

        const path = document.createElement("div");
        path.className = "p";
        path.textContent = item.path;

        row.appendChild(titleRow);
        row.appendChild(meta);
        row.appendChild(summary);
        row.appendChild(footer);
        row.appendChild(path);
        fileListEl.appendChild(row);
      });

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "hint";
        empty.textContent = "当前筛选条件下没有匹配的事项。";
        fileListEl.appendChild(empty);
      }
    }

    function makeDetailBlock(titleText, bodyBuilder) {
      const item = document.createElement("div");
      item.className = "item preview-detail-block";
      const title = document.createElement("div");
      title.className = "tt";
      title.textContent = titleText;
      const sub = document.createElement("div");
      sub.className = "sub";
      bodyBuilder(sub);
      item.appendChild(title);
      item.appendChild(sub);
      return item;
    }

    function appendKVRows(container, rows) {
      const wrap = document.createElement("div");
      wrap.className = "preview-detail-kv";
      rows.forEach(([key, value]) => {
        const row = document.createElement("div");
        row.className = "preview-detail-kv-row";
        const keyEl = document.createElement("div");
        keyEl.className = "k";
        keyEl.textContent = key;
        const valEl = document.createElement("div");
        valEl.className = "v";
        valEl.textContent = value;
        row.appendChild(keyEl);
        row.appendChild(valEl);
        wrap.appendChild(row);
      });
      container.appendChild(wrap);
    }

    function renderDetail() {
      const item = selectedItem();
      if (!item) return;

      detailTitleEl.innerHTML = "";
      const titleRow = document.createElement("div");
      titleRow.className = "detail-title-row";
      titleRow.appendChild(makeIconBadge(item));
      const titleText = document.createElement("div");
      titleText.className = "detail-title-line";
      const titleMain = document.createElement("span");
      titleMain.className = "detail-title-text";
      titleMain.textContent = item.title;
      titleText.appendChild(titleMain);
      titleRow.appendChild(titleText);
      detailTitleEl.appendChild(titleRow);

      detailSubEl.textContent = "下一责任人：" + item.nextOwner + " · " + item.summary;
      detailPathTextEl.textContent = item.path;

      detailMetaEl.innerHTML = "";
      detailMetaEl.appendChild(makeChip(item.status, item.tone));
      detailMetaEl.appendChild(makeChip("更新:" + item.updatedAt, "muted"));
      detailMetaEl.appendChild(makeChip("参与Agent " + uniqueAgentsOf(item).length + " 位", "muted"));

      detailExcerptEl.innerHTML = "";
      (item.excerpt || []).forEach((text) => {
        const p = document.createElement("p");
        p.textContent = text;
        detailExcerptEl.appendChild(p);
      });

      detailMoreEl.innerHTML = "";
      detailMoreEl.appendChild(makeDetailBlock("任务说明", (sub) => {
        const copy = document.createElement("div");
        copy.className = "preview-detail-copy";
        copy.textContent = item.progress || item.summary || "";
        sub.appendChild(copy);
        if ((item.decisions || []).length) {
          appendKVRows(sub, item.decisions || []);
        }
      }));
      detailMoreEl.appendChild(makeDetailBlock("参与Agent", (sub) => {
        const list = document.createElement("div");
        list.className = "preview-detail-agent-list";
        uniqueAgentsOf(item).forEach((agent) => {
          list.appendChild(makeChip(agent, "muted"));
        });
        sub.appendChild(list);
      }));
      detailMoreEl.appendChild(makeDetailBlock("最近动作时间线", (sub) => {
        const timeline = document.createElement("div");
        timeline.className = "preview-timeline";
        (item.timeline || []).forEach(([time, text]) => {
          const row = document.createElement("div");
          row.className = "preview-timeline-row";
          const timeEl = document.createElement("div");
          timeEl.className = "preview-timeline-time";
          timeEl.textContent = time;
          const textEl = document.createElement("div");
          textEl.className = "preview-timeline-text";
          textEl.textContent = text;
          row.appendChild(timeEl);
          row.appendChild(textEl);
          timeline.appendChild(row);
        });
        sub.appendChild(timeline);
      }));
      detailMoreEl.appendChild(makeDetailBlock("引用与承接", (sub) => {
        if ((item.references || []).length) {
          appendKVRows(sub, item.references || []);
        }
        const list = document.createElement("ul");
        list.className = "preview-detail-list";
        (item.evidenceList || []).forEach((entry) => {
          const li = document.createElement("li");
          li.textContent = entry;
          list.appendChild(li);
        });
        sub.appendChild(list);
      }));
      detailMoreEl.appendChild(makeDetailBlock("边界与提醒", (sub) => appendKVRows(sub, item.boundaries || [])));
    }

    function renderDensity() {
      document.body.classList.toggle("preview-density-compact", state.density === "compact");
    }

    async function copyChannelPath() {
      try {
        await navigator.clipboard.writeText(channelPathTextEl.textContent || "");
        const old = channelPathCopyBtn.textContent;
        channelPathCopyBtn.textContent = "已复制";
        window.setTimeout(() => {
          channelPathCopyBtn.textContent = old;
        }, 1200);
      } catch (_) {
        channelPathCopyBtn.textContent = "复制失败";
        window.setTimeout(() => {
          channelPathCopyBtn.textContent = "复制路径";
        }, 1200);
      }
    }

    channelPathCopyBtn.addEventListener("click", copyChannelPath);

    document.body.classList.toggle("preview-embedded", window.self !== window.top);

    function render() {
      renderDensity();
      renderChannelList();
      renderChannelInfo();
      renderFilterbar();
      renderConversations();
      renderKnowledge();
      renderItems();
      renderDetail();
    }

    render();
  </script>
</body>
</html>
